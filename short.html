d-mode:screen;opacity:0;transform:translateX(0) skewX(-18deg)}.card .play{position:absolute;z-index:2;left:50%;top:50%;translate:-50% -50%;width:52px;height:52px;border:1px solid #ddd;border-radius:50%;transition:.4s;background:#0002}.card .play:after{content:'';position:absolute;left:21px;top:18px;border-block:8px solid transparent;border-left:12px solid #fff}@media(hover:hover){.card:hover img{transform:scale(1.025);filter:brightness(1.02) contrast(1.06) saturate(1.04)}.card:hover:before{opacity:1}.card:hover:after{animation:cinematicSweep .85s cubic-bezier(.22,.61,.36,1) forwards}.card:hover .play{border-color:#bcd0ff;transform:scale(1.1);background:#050a18aa;box-shadow:0 0 24px #82aaff70}}.card.touch-fx img{transform:scale(1.02);filter:brightness(1.02) contrast(1.05) saturate(1.03)}.card.touch-fx:before{opacity:1}.card.touch-fx:after{animation:cinematicSweep .5s cubic-bezier(.22,.61,.36,1) forwards}.card.touch-fx .play{border-color:#bcd0ff;transform:scale(1.08);background:#050a18aa;box-shadow:0 0 20px #82aaff66}.card h2{position:absolute;z-index:2;left:22px;bottom:18px;margin:0;font-size:15px;font-weight:400;text-shadow:0 1px 10px #000}.viewer{position:fixed;z-index:20;inset:0;background:#000;display:none;place-items:center;padding:60px}.viewer.open{display:grid}.viewer iframe{width:min(1200px,90vw);aspect-ratio:16/9;border:0}.close{position:absolute;right:30px;top:20px;background:none;border:0;font-size:32px}.footer{height:100px;display:flex;justify-content:space-between;align-items:center;padding:0 4.7%;border-top:1px solid #111}.footer p{font-size:8px;color:#555}@keyframes cinematicSweep{0%{opacity:0;transform:translateX(0) skewX(-18deg)}16%{opacity:.82}100%{opacity:0;transform:translateX(330%) skewX(-18deg)}}

.nav a:hover{background:linear-gradient(90deg,#ff5370,#ff9f43,#ffe66d,#5ee6a8,#82aaff,#c792ea,#82aaff);background-size:280%;background-clip:text;-webkit-background-clip:text;color:transparent;animation:rainbowWave .62s ease-out forwards}@keyframes rainbowWave{0%{background-position:100%}82%{background-position:0;-webkit-text-fill-color:transparent}100%{-webkit-text-fill-color:#82aaff}}@media(max-width:760px){.bar{height:132px;position:relative;grid-template-columns:1fr;align-content:start;padding-top:24px}.bar .nav{display:flex!important;position:absolute;top:77px;left:20px;right:20px;justify-content:space-between;gap:6px}.bar .nav a{font-size:8px;padding:7px 0}}</style></head><body><header class="bar"><a class="brand" href="index.html"><strong>Franciszek Lubicz-Łapiński</strong><span>Director of photography</span></a><nav class="nav"><a href="index.html">Portfolio</a><a class="active" href="short.html">Short</a><a href="about.html">O mnie</a><a href="contact.html">Kontakt</a></nav><div class="social"><a href="https://vimeo.com/lubicz">v</a><a href="https://instagram.com/franek_lubicz">◎</a><a href="https://linkedin.com">in</a></div></header><section class="intro"><p>Short films</p><h1>Filmy krótkometrażowe</h1></section><main class="films" id="films"></main><footer class="footer"><p>© Wszystkie prawa zastrzeżone</p></footer><div class="viewer" id="viewer"><button class="close" onclick="closeFilm()">×</button><iframe id="frame" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div><script>
const shorts=[{title:'Wróżda',embed:'https://player.vimeo.com/video/1020316306?title=0&byline=0&portrait=0',image:'https://i.vimeocdn.com/video/1938864748-ab9a5cedbb5d873f02f6823ed56b5451fbd3109bfb804b68502da8b60f9bfa81-d_1280'},{title:'Reset',embed:'https://player.vimeo.com/video/255637555?title=0&byline=0&portrait=0',image:'https://i.vimeocdn.com/video/713814349-79c3fb5e4508f66ae944fdd8bdd045e1e5eb216eb1629d476cf783ae6b92f11b-d_1280'},{title:'Ostatni klaps',embed:'https://www.youtube.com/embed/e3dafon0bKg?rel=0',image:'https://img.youtube.com/vi/e3dafon0bKg/maxresdefault.jpg'}];films.innerHTML=shorts.map((f,i)=>`<button class="card" onclick="selectShort(this,${i})"><img src="${f.image}" alt=""><span class="play"></span><h2>${f.title}</h2></button>`).join('');function selectShort(el,i){if(matchMedia('(hover:none)').matches){el.classList.remove('touch-fx');void el.offsetWidth;el.classList.add('touch-fx');setTimeout(()=>{el.classList.remove('touch-fx');openFilm(i)},420)}else openFilm(i)}function openFilm(i){frame.src=shorts[i].embed+(shorts[i].embed.includes('?')?'&':'?')+'autoplay=0&muted=0&playsinline=1';viewer.classList.add('open');document.body.classList.add('lock')}function closeFilm(){frame.src='';viewer.classList.remove('open');document.body.classList.remove('lock')}addEventListener('keydown',e=>e.key==='Escape'&&closeFilm());
