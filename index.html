<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Franciszek Lubicz-Łapiński — Director of Photography</title>
  <meta name="description" content="Portfolio operatorskie Franciszka Lubicz-Łapińskiego">
  <style>
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#000;color:#f0f0f0;font-family:Arial,Helvetica,sans-serif;font-weight:400}a{color:inherit;text-decoration:none}button{font:inherit;color:inherit}.bar{height:118px;display:grid;grid-template-columns:300px 1fr 110px;align-items:center;padding:0 4.7%;background:#000}.brand{line-height:1}.brand strong{display:block;font-size:15px;font-weight:400;letter-spacing:-.4px}.brand span{display:block;margin-top:3px;font-size:10px;color:#bbb}.nav{display:flex;justify-content:center;gap:44px;font-size:9px;letter-spacing:.08em;text-transform:uppercase}.nav a{padding:12px 0;border-bottom:1px solid transparent}.nav a:hover,.nav a.active{color:#91adff;border-color:#91adff}.social{display:flex;justify-content:flex-end;gap:15px;color:#91adff;font-size:10px}.social a:hover{color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;column-gap:28px;row-gap:0;padding:0 4.7% 110px}.film{position:relative;height:430px;cursor:pointer;overflow:hidden;background:#000}.film img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .45s,filter .4s;filter:grayscale(35%)}.film:hover img{opacity:.42}.play{position:absolute;left:50%;top:50%;translate:-50% -50%;width:47px;height:47px;border:1px solid #555;border-radius:50%;display:grid;place-items:center;transition:.3s}.play:after{content:'';display:block;margin-left:4px;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:11px solid #777}.film:hover .play{border-color:#eee;transform:scale(1.08)}.film:hover .play:after{border-left-color:#eee}.info{position:absolute;left:20px;bottom:18px;opacity:0;transition:.3s}.film:hover .info{opacity:1}.info h2{margin:0;font-size:13px;font-weight:400}.info p{margin:4px 0 0;font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.1em}.footer{height:130px;display:grid;grid-template-columns:300px 1fr 110px;align-items:center;padding:0 4.7%;border-top:1px solid #111}.footer .nav{justify-content:center}.copy{font-size:8px;color:#555;text-align:right}.menu{display:none;background:none;border:0;padding:10px}.menu span{display:block;width:24px;height:1px;margin:6px;background:#ddd}.modal{position:fixed;z-index:20;inset:0;background:#000;display:none;align-items:center;justify-content:center}.modal.open{display:flex}.modal button{position:absolute;right:35px;top:25px;background:none;border:0;font-size:30px;font-weight:200;cursor:pointer}.modal-content{text-align:center}.modal-content .play{position:relative;left:auto;top:auto;translate:none;margin:0 auto 25px;width:70px;height:70px}.modal-content h2{font-size:22px;font-weight:400;margin:8px}.modal-content p{font-size:9px;color:#777;letter-spacing:.15em;text-transform:uppercase}.mobile-nav{display:none}
    @media(max-width:760px){.bar{height:92px;grid-template-columns:1fr auto;padding:0 20px}.bar>.nav,.social{display:none}.menu{display:block}.mobile-nav{position:fixed;z-index:10;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;font-size:13px;text-transform:uppercase;letter-spacing:.12em}.mobile-nav.open{display:flex}.mobile-nav .close{position:absolute;top:24px;right:25px;font-size:28px;background:none;border:0}.grid{grid-template-columns:1fr;padding:0 20px 60px;gap:0}.film{height:58vw;min-height:260px}.film img{opacity:.24}.info{opacity:1;left:14px;bottom:12px}.footer{height:110px;grid-template-columns:1fr;padding:0 20px}.footer .nav,.footer .copy{display:none}.play{width:42px;height:42px}}
  </style>
</head>
<body>
  <header class="bar">
    <a class="brand" href="#top"><strong>Franciszek Lubicz-Łapiński</strong><span>Director of photography</span></a>
    <nav class="nav" aria-label="Menu"><a class="active" href="#portfolio">Portfolio</a><a href="#short">Short</a><a href="#piony">Piony</a><a href="about.html">O mnie</a><a href="mailto:hello@lubiczdp.com">Kontakt</a></nav>
    <div class="social"><a href="https://vimeo.com/lubicz">v</a><a href="https://instagram.com/franek_lubicz">◎</a><a href="https://linkedin.com">in</a><a href="#">↗</a></div>
    <button class="menu" aria-label="Otwórz menu" onclick="toggleMenu()"><span></span><span></span></button>
  </header>
  <nav class="mobile-nav" id="mobile"><button class="close" onclick="toggleMenu()">×</button><a onclick="toggleMenu()" href="#portfolio">Portfolio</a><a onclick="toggleMenu()" href="#short">Short</a><a onclick="toggleMenu()" href="#piony">Piony</a><a href="about.html">O mnie</a><a href="mailto:hello@lubiczdp.com">Kontakt</a></nav>
  <main class="grid" id="portfolio"></main>
  <footer class="footer"><a class="brand" href="#top"><strong>Franciszek Lubicz-Łapiński</strong><span>Director of photography</span></a><nav class="nav"><a class="active" href="#portfolio">Portfolio</a><a href="#short">Short</a><a href="#piony">Piony</a><a href="about.html">O mnie</a><a href="mailto:hello@lubiczdp.com">Kontakt</a></nav><p class="copy">© Wszystkie prawa zastrzeżone</p></footer>
  <div class="modal" id="modal" onclick="closeFilm(event)"><button onclick="closeFilm(event)">×</button><div class="modal-content"><span class="play"></span><h2 id="title"></h2><p id="kind"></p></div></div>
  <script>
    const films=[
      ['Szept','Film fabularny · 2025','https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=1600&q=85'],
      ['Piony','Fashion film · 2024','https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=1600&q=85'],
      ['Po drugiej stronie','Short film · 2024','https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1600&q=85'],
      ['Nocny kurs','Commercial · 2023','https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=85'],
      ['Bez słów','Music video · 2023','https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1600&q=85'],
      ['Światło dzienne','Documentary · 2022','https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=85'],
      ['Lato','Commercial · 2022','https://images.unsplash.com/photo-1470214304380-aadaedcfff1b?auto=format&fit=crop&w=1600&q=85'],
      ['Miasto','Short film · 2021','https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=1600&q=85']
    ];
    portfolio.innerHTML=films.map((f,i)=>`<article class="film" id="${i===1?'piony':i===2?'short':''}" onclick="openFilm(${i})"><img src="${f[2]}" alt="Kadr z filmu ${f[0]}" loading="lazy"><span class="play"></span><div class="info"><h2>${f[0]}</h2><p>${f[1]}</p></div></article>`).join('');
    function openFilm(i){title.textContent=films[i][0];kind.textContent=films[i][1]+' · miejsce na film Vimeo';modal.classList.add('open')}
    function closeFilm(e){e.stopPropagation();modal.classList.remove('open')}
    function toggleMenu(){mobile.classList.toggle('open')}
    addEventListener('keydown',e=>e.key==='Escape'&&(modal.classList.remove('open'),mobile.classList.remove('open')));
  </script>
</body>
</html>
