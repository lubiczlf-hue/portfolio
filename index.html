  <style>
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#000;color:#f0f0f0;font-family:Arial,Helvetica,sans-serif;font-weight:400}body.player-open{overflow:hidden}a{color:inherit;text-decoration:none}button{font:inherit;color:inherit}.bar{height:118px;display:grid;grid-template-columns:300px 1fr 110px;align-items:center;padding:0 4.7%;background:#000}.brand{line-height:1}.brand strong{display:block;font-size:15px;font-weight:400;letter-spacing:-.4px}.brand span{display:block;margin-top:3px;font-size:10px;color:#bbb}.nav{display:flex;justify-content:center;gap:44px;font-size:9px;letter-spacing:.08em;text-transform:uppercase}.nav a{padding:12px 0;border-bottom:1px solid transparent}.nav a:hover,.nav a.active{color:#91adff;border-color:#91adff}.social{display:flex;justify-content:flex-end;gap:15px;color:#91adff;font-size:10px}.social a:hover{color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:0 4.7% 110px}.film{position:relative;isolation:isolate;width:100%;aspect-ratio:16/9;cursor:pointer;overflow:hidden;background:#080808;border:0;padding:0}.film img{display:block;width:100%;height:100%;object-fit:cover;opacity:1;filter:brightness(1) saturate(1);transition:transform .7s cubic-bezier(.2,.7,.2,1),filter .45s}.film:before,.film:after{content:'';position:absolute;z-index:1;pointer-events:none}.film:before{inset:0;background:linear-gradient(180deg,#82aaff0d,#00000012);box-shadow:inset 0 -35px 70px #0004;opacity:0;transition:opacity .35s}.film:after{inset:-20% auto -20% -70%;width:55%;background:linear-gradient(110deg,transparent 28%,#ffffff24 41%,#82aaff99 50%,#ffffff30 59%,transparent 72%);mix-blend-mode:screen;opacity:0;transform:translateX(0) skewX(-18deg)}.play{position:absolute;z-index:2;left:50%;top:50%;translate:-50% -50%;width:47px;height:47px;border:1px solid #bbb;border-radius:50%;display:grid;place-items:center;transition:.4s;background:#0002}.play:after{content:'';display:block;margin-left:4px;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:11px solid #ddd}@media(hover:hover){.film:hover img{transform:scale(1.025);filter:brightness(1.02) contrast(1.06) saturate(1.04)}.film:hover:before{opacity:1}.film:hover:after{animation:cinematicSweep .85s cubic-bezier(.22,.61,.36,1) forwards}.film:hover .play{border-color:#bcd0ff;transform:scale(1.1);background:#050a18aa;box-shadow:0 0 24px #82aaff70}.film:hover .play:after{border-left-color:#fff}}.film.touch-fx img{transform:scale(1.02);filter:brightness(1.02) contrast(1.05) saturate(1.03)}.film.touch-fx:before{opacity:1}.film.touch-fx:after{animation:cinematicSweep .5s cubic-bezier(.22,.61,.36,1) forwards}.film.touch-fx .play{border-color:#bcd0ff;transform:scale(1.08);background:#050a18aa;box-shadow:0 0 20px #82aaff66}.footer{height:105px;display:flex;align-items:center;justify-content:space-between;padding:0 4.7%;border-top:1px solid #111}.copy{font-size:8px;color:#555;text-align:right}.menu{display:none;background:none;border:0;padding:10px}.menu span{display:block;width:24px;height:1px;margin:6px;background:#ddd}.mobile-nav{display:none}.viewer{position:fixed;z-index:50;inset:0;background:#000;display:none;align-items:center;justify-content:center;padding:60px}.viewer.open{display:flex}.viewer-frame{position:relative;width:min(1200px,90vw);aspect-ratio:16/9;background:#050505}.viewer-frame.loading:before{content:'';position:absolute;left:50%;top:50%;width:34px;height:34px;margin:-17px;border:2px solid #82aaff33;border-top-color:#82aaff;border-radius:50%;animation:playerSpin .7s linear infinite}.viewer iframe{position:relative;z-index:1;display:block;width:100%;height:100%;border:0;background:transparent;opacity:1;transition:opacity .25s}.viewer-frame.loading iframe{opacity:0}.viewer-close{position:absolute;right:32px;top:22px;background:none;border:0;font-size:32px;font-weight:200;cursor:pointer}@keyframes cinematicSweep{0%{opacity:0;transform:translateX(0) skewX(-18deg)}16%{opacity:.82}100%{opacity:0;transform:translateX(330%) skewX(-18deg)}}@keyframes playerSpin{to{transform:rotate(360deg)}}
    @media(max-width:760px){.bar{height:92px;grid-template-columns:1fr auto;padding:0 20px}.bar>.nav,.social{display:none}.menu{display:block}.mobile-nav{position:fixed;z-index:10;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;font-size:13px;text-transform:uppercase;letter-spacing:.12em}.mobile-nav.open{display:flex}.mobile-nav .close{position:absolute;top:24px;right:25px;font-size:28px;background:none;border:0}.grid{grid-template-columns:1fr;padding:0 20px 60px;gap:18px}.footer{height:95px;padding:0 20px}.footer .copy{display:block}.play{width:42px;height:42px}.viewer{padding:45px 12px}.viewer-frame{width:100%}.viewer-close{right:18px;top:12px}}
    .brand strong{font-size:16.5px}.brand span{font-size:11px}.nav{gap:34px}.nav a{padding:10px 2px!important;border:0!important;border-radius:0;transition:letter-spacing .35s,transform .35s,text-shadow .35s}.nav a:before{display:none}.nav a:hover{letter-spacing:.16em;transform:translateY(-2px);background:linear-gradient(90deg,#ff5370,#ff9f43,#ffe66d,#5ee6a8,#82aaff,#c792ea,#82aaff);background-size:280% 100%;background-clip:text;-webkit-background-clip:text;color:transparent!important;animation:rainbowWave .62s ease-out forwards}.nav a.active{color:#82aaff!important;letter-spacing:.16em;transform:translateY(-2px);text-shadow:0 0 13px #82aaff99}.social{color:#82aaff;font-size:11px}.footer{justify-content:flex-end}@keyframes rainbowWave{0%{background-position:100% 0}82%{background-position:0 0;-webkit-text-fill-color:transparent}100%{background-position:0 0;-webkit-text-fill-color:#82aaff;text-shadow:0 0 13px #82aaff99}}
    @media(max-width:760px){.bar{height:132px!important;position:relative;grid-template-columns:1fr!important;align-content:start;padding-top:24px!important}.bar>.nav{display:flex!important;position:absolute;top:77px;left:20px;right:20px;justify-content:space-between;gap:6px}.bar>.nav a{font-size:8px;padding:7px 0!important}.menu,.mobile-nav{display:none!important}}
  </style>
</head>
<body>
  <header class="bar">
    <a class="brand" href="#top"><strong>Franciszek Lubicz-Łapiński</strong><span>Director of photography</span></a>
    <nav class="nav" aria-label="Menu"><a class="active" href="index.html">Portfolio</a><a href="short.html">Short</a><a href="about.html">O mnie</a><a href="contact.html">Kontakt</a></nav>
    <div class="social"><a href="https://vimeo.com/lubicz">v</a><a href="https://instagram.com/franek_lubicz">◎</a><a href="https://linkedin.com">in</a><a href="#">↗</a></div>
    <button class="menu" aria-label="Otwórz menu" onclick="toggleMenu()"><span></span><span></span></button>
  </header>
  <nav class="mobile-nav" id="mobile"><button class="close" onclick="toggleMenu()">×</button><a href="index.html">Portfolio</a><a href="short.html">Short</a><a href="about.html">O mnie</a><a href="contact.html">Kontakt</a></nav>
  <main class="grid" id="portfolio"></main>
  <footer class="footer"><p class="copy">© Wszystkie prawa zastrzeżone</p></footer>
  <div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-label="Odtwarzacz filmu"><button class="viewer-close" onclick="closeVideo()" aria-label="Zamknij film">×</button><div class="viewer-frame" id="viewerFrame"></div></div>
  <script src="films.js?v=2"></script>
  <script>
    portfolio.innerHTML=films.map((f,i)=>`<button class="film" id="${f.section||''}" onclick="selectVideo(this,${i})" aria-label="Odtwórz film"><img src="${f.image}" alt="" width="1280" height="720" loading="${i<4?'eager':'lazy'}" fetchpriority="${i<4?'high':'low'}" decoding="async"><span class="play"></span></button>`).join('');
    function selectVideo(el,i){if(matchMedia('(hover:none)').matches){el.classList.remove('touch-fx');void el.offsetWidth;el.classList.add('touch-fx');setTimeout(()=>{el.classList.remove('touch-fx');openVideo(i)},420)}else openVideo(i)}
    function openVideo(i){const f=films[i];viewerFrame.classList.add('loading');viewer.classList.add('open');document.body.classList.add('player-open');const embed=f.embed.replace(/([?&])api=1(&|$)/,'$1').replace(/[?&]$/,'');viewerFrame.innerHTML=`<iframe src="${embed}${embed.includes('?')?'&':'?'}autoplay=0&muted=0&playsinline=1" loading="eager" onload="viewerFrame.classList.remove('loading')" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen title="Odtwarzacz filmu"></iframe>`}
    function closeVideo(){viewer.classList.remove('open');viewerFrame.classList.remove('loading');viewerFrame.innerHTML='';document.body.classList.remove('player-open')}
    function toggleMenu(){mobile.classList.toggle('open')}
    addEventListener('keydown',e=>e.key==='Escape'&&(mobile.classList.remove('open'),closeVideo()));
  </script>
</body>
</html>
