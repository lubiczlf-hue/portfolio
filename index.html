<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Franciszek Lubicz-Łapiński — Director of Photography</title>
  <meta name="description" content="Portfolio operatorskie Franciszka Lubicz-Łapińskiego">
  <style>
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#000;color:#f0f0f0;font-family:Arial,Helvetica,sans-serif;font-weight:400}body.player-open{overflow:hidden}a{color:inherit;text-decoration:none}button{font:inherit;color:inherit}.bar{height:118px;display:grid;grid-template-columns:300px 1fr 110px;align-items:center;padding:0 4.7%;background:#000}.brand{line-height:1}.brand strong{display:block;font-size:15px;font-weight:400;letter-spacing:-.4px}.brand span{display:block;margin-top:3px;font-size:10px;color:#bbb}.nav{display:flex;justify-content:center;gap:44px;font-size:9px;letter-spacing:.08em;text-transform:uppercase}.nav a{padding:12px 0;border-bottom:1px solid transparent}.nav a:hover,.nav a.active{color:#91adff;border-color:#91adff}.social{display:flex;justify-content:flex-end;gap:15px;color:#91adff;font-size:10px}.social a:hover{color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;column-gap:28px;row-gap:0;padding:0 4.7% 110px}.film{position:relative;height:430px;cursor:pointer;overflow:hidden;background:#000;border:0;padding:0;text-align:left}.film img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .45s,filter .4s;filter:grayscale(35%)}.film:hover img{opacity:.42}.play{position:absolute;left:50%;top:50%;translate:-50% -50%;width:47px;height:47px;border:1px solid #555;border-radius:50%;display:grid;place-items:center;transition:.3s}.play:after{content:'';display:block;margin-left:4px;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:11px solid #777}.film:hover .play{border-color:#eee;transform:scale(1.08)}.film:hover .play:after{border-left-color:#eee}.info{position:absolute;left:20px;bottom:18px;opacity:0;transition:.3s}.film:hover .info{opacity:1}.info h2{margin:0;font-size:13px;font-weight:400}.info p{margin:4px 0 0;font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.1em}.footer{height:105px;display:flex;align-items:center;justify-content:space-between;padding:0 4.7%;border-top:1px solid #111}.copy{font-size:8px;color:#555;text-align:right}.menu{display:none;background:none;border:0;padding:10px}.menu span{display:block;width:24px;height:1px;margin:6px;background:#ddd}.mobile-nav{display:none}.viewer{position:fixed;z-index:50;inset:0;background:#000;display:none;align-items:center;justify-content:center;padding:60px}.viewer.open{display:flex}.viewer-frame{width:min(1200px,90vw);aspect-ratio:16/9}.viewer iframe{display:block;width:100%;height:100%;border:0}.viewer-close{position:absolute;right:32px;top:22px;background:none;border:0;font-size:32px;font-weight:200;cursor:pointer}.viewer-title{position:absolute;left:32px;top:28px;font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#aaa}
    @media(max-width:760px){.bar{height:92px;grid-template-columns:1fr auto;padding:0 20px}.bar>.nav,.social{display:none}.menu{display:block}.mobile-nav{position:fixed;z-index:10;inset:0;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;font-size:13px;text-transform:uppercase;letter-spacing:.12em}.mobile-nav.open{display:flex}.mobile-nav .close{position:absolute;top:24px;right:25px;font-size:28px;background:none;border:0}.grid{grid-template-columns:1fr;padding:0 20px 60px;gap:0}.film{height:58vw;min-height:260px}.film img{opacity:.24}.info{opacity:1;left:14px;bottom:12px}.footer{height:95px;padding:0 20px}.footer .copy{display:block}.play{width:42px;height:42px}.viewer{padding:45px 12px}.viewer-frame{width:100%}.viewer-close{right:18px;top:12px}.viewer-title{left:18px;top:18px}}
  </style>
</head>
<body>
  <header class="bar">
    <a class="brand" href="#top"><strong>Franciszek Lubicz-Łapiński</strong><span>Director of photography</span></a>
    <nav class="nav" aria-label="Menu"><a class="active" href="#portfolio">Portfolio</a><a href="#short">Short</a><a href="#piony">Piony</a><a href="about.html">O mnie</a><a href="mailto:hello@lubiczdp.com">Kontakt</a></nav>
    <div class="social"><a href="https://vimeo.com/lubicz">v</a><a href="https://instagram.com/franek_lubicz">◎</a><a href="https://linkedin.com">in</a><a href="#">↗</a></div>
    <button class="menu" aria-label="Otwórz menu" onclick="toggleMenu()"><span></span><span></span></button>
  </header>
  <nav class="mobile-nav" id="mobile"><button class="close" onclick="toggleMenu()">×</button><a onclick="toggleMenu()" href="#portfolio">Portfolio</a><a onclick="toggleMenu()" href="#short">Short</a><a onclick="toggleMenu()" href="#piony">Piony</a><a href="about.html">O mnie</a><a href="mailto:hello@lubiczdp.com">Kontakt</a></nav>
  <main class="grid" id="portfolio"></main>
  <footer class="footer"><a class="brand" href="#top"><strong>Franciszek Lubicz-Łapiński</strong><span>Director of photography</span></a><p class="copy">© Wszystkie prawa zastrzeżone</p></footer>
  <div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-label="Odtwarzacz filmu"><p class="viewer-title" id="viewerTitle"></p><button class="viewer-close" onclick="closeVideo()" aria-label="Zamknij film">×</button><div class="viewer-frame" id="viewerFrame"></div></div>
  <script src="films.js"></script>
  <script>
    portfolio.innerHTML=films.map((f,i)=>`<button class="film" id="${f.section||''}" onclick="openVideo(${i})"><img src="${f.image}" alt="Kadr z filmu ${f.title}" loading="lazy"><span class="play"></span><div class="info"><h2>${f.title}</h2><p>${f.type||'Film'}${f.year?' · '+f.year:''}</p></div></button>`).join('');
    function openVideo(i){const f=films[i];viewerTitle.textContent=f.title;viewerFrame.innerHTML=`<iframe src="${f.embed}${f.embed.includes('?')?'&':'?'}autoplay=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen title="${f.title}"></iframe>`;viewer.classList.add('open');document.body.classList.add('player-open')}
    function closeVideo(){viewer.classList.remove('open');viewerFrame.innerHTML='';document.body.classList.remove('player-open')}
    function toggleMenu(){mobile.classList.toggle('open')}
    addEventListener('keydown',e=>e.key==='Escape'&&(mobile.classList.remove('open'),closeVideo()));
  </script>
</body>
</html>
